name: iOS Build and Upload

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CocoaPods and xcodeproj
        run: |
          sudo gem install cocoapods
          sudo gem install xcodeproj
          pod install

      - name: Fix signing settings
        run: |
          ruby <<'RUBY'
          require 'xcodeproj'

          team_id = 'BA9RRCP43W'
          bundle_id = 'com.sirphilipkorea.app'
          app_target_name = 'Sir Philip Korea 써필립 코리아'

          project_path = 'Sir Philip Korea 써필립 코리아.xcodeproj'
          project = Xcodeproj::Project.open(project_path)

          project.targets.each do |target|
            target.build_configurations.each do |config|
              s = config.build_settings

              if target.name == app_target_name
                s['PRODUCT_BUNDLE_IDENTIFIER'] = bundle_id
                s['DEVELOPMENT_TEAM'] = team_id
                s['CODE_SIGN_STYLE'] = 'Automatic'
                s['CODE_SIGNING_ALLOWED'] = 'YES'
                s['CODE_SIGNING_REQUIRED'] = 'YES'
                s.delete('CODE_SIGN_IDENTITY')
                s.delete('CODE_SIGN_IDENTITY[sdk=iphoneos*]')
                s.delete('PROVISIONING_PROFILE')
                s.delete('PROVISIONING_PROFILE_SPECIFIER')
              else
                s['CODE_SIGNING_ALLOWED'] = 'NO'
                s['CODE_SIGNING_REQUIRED'] = 'NO'
                s.delete('CODE_SIGN_IDENTITY')
                s.delete('CODE_SIGN_IDENTITY[sdk=iphoneos*]')
                s.delete('DEVELOPMENT_TEAM')
                s.delete('PROVISIONING_PROFILE')
                s.delete('PROVISIONING_PROFILE_SPECIFIER')
              end
            end
          end

          project.save

          pods_path = 'Pods/Pods.xcodeproj'
          if File.exist?(pods_path)
            pods = Xcodeproj::Project.open(pods_path)
            pods.targets.each do |target|
              target.build_configurations.each do |config|
                s = config.build_settings
                s['CODE_SIGNING_ALLOWED'] = 'NO'
                s['CODE_SIGNING_REQUIRED'] = 'NO'
                s.delete('CODE_SIGN_IDENTITY')
                s.delete('CODE_SIGN_IDENTITY[sdk=iphoneos*]')
                s.delete('DEVELOPMENT_TEAM')
                s.delete('PROVISIONING_PROFILE')
                s.delete('PROVISIONING_PROFILE_SPECIFIER')
              end
            end
            pods.save
          end
          RUBY

      - name: Create API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          chmod 600 ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Build archive
        run: |
          xcodebuild archive \
            -workspace "Sir Philip Korea 써필립 코리아.xcworkspace" \
            -scheme "Sir Philip Korea 써필립 코리아" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "build/SirPhilipKorea.xcarchive" \
            DEVELOPMENT_TEAM="BA9RRCP43W" \
            PRODUCT_BUNDLE_IDENTIFIER="com.sirphilipkorea.app" \
            CODE_SIGN_STYLE="Automatic" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Create export options
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>BA9RRCP43W</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "build/SirPhilipKorea.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SirPhilipKorea-IPA
          path: build/export/*.ipa

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/export/*.ipa \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
