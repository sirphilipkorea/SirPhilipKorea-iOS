name: iOS Build and Upload

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install CocoaPods and xcodeproj
        run: |
          sudo gem install cocoapods
          sudo gem install xcodeproj

      - name: Install pods
        run: |
          pod install

      - name: Fix signing settings
        run: |
          ruby <<'RUBY'
          require 'xcodeproj'

          team_id = 'BA9RRCP43W'
          bundle_id = 'com.sirphilipkorea.app'
          app_target_name = 'Sir Philip Korea 써필립 코리아'

          main_project_path = 'Sir Philip Korea 써필립 코리아.xcodeproj'
          main_project = Xcodeproj::Project.open(main_project_path)

          main_project.targets.each do |target|
            target.build_configurations.each do |config|
              settings = config.build_settings

              if target.name == app_target_name
                settings['PRODUCT_BUNDLE_IDENTIFIER'] = bundle_id
                settings['DEVELOPMENT_TEAM'] = team_id
                settings['CODE_SIGN_STYLE'] = 'Automatic'
                settings['CODE_SIGNING_ALLOWED'] = 'YES'
                settings['CODE_SIGNING_REQUIRED'] = 'YES'
                settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
                settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
                settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
                settings['PROVISIONING_PROFILE'] = ''
              else
                settings['CODE_SIGNING_ALLOWED'] = 'NO'
                settings['CODE_SIGNING_REQUIRED'] = 'NO'
                settings['CODE_SIGN_IDENTITY'] = ''
                settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = ''
                settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
                settings['DEVELOPMENT_TEAM'] = ''
                settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
                settings['PROVISIONING_PROFILE'] = ''
              end
            end
          end

          main_project.save

          pods_project_path = 'Pods/Pods.xcodeproj'
          if File.exist?(pods_project_path)
            pods_project = Xcodeproj::Project.open(pods_project_path)

            pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                settings = config.build_settings
                settings['CODE_SIGNING_ALLOWED'] = 'NO'
                settings['CODE_SIGNING_REQUIRED'] = 'NO'
                settings['CODE_SIGN_IDENTITY'] = ''
                settings['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = ''
                settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
                settings['DEVELOPMENT_TEAM'] = ''
                settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
                settings['PROVISIONING_PROFILE'] = ''
              end
            end

            pods_project.save
          end
          RUBY

      - name: Create API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          chmod 600 ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Build archive
        run: |
          xcodebuild archive \
            -workspace "Sir Philip Korea 써필립 코리아.xcworkspace" \
            -scheme "Sir Philip Korea 써필립 코리아" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "build/SirPhilipKorea.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Create export options
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>BA9RRCP43W</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "build/SirPhilipKorea.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SirPhilipKorea-IPA
          path: build/export/*.ipa

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/export/*.ipa \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
