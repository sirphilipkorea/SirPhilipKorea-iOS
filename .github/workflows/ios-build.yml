name: Build iOS & Upload TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26

    env:
      WORKSPACE: SirPhilipKorea.xcworkspace
      SCHEME: SirPhilipKorea
      CONFIGURATION: Release
      ARCHIVE_PATH: build/SirPhilipKorea.xcarchive
      EXPORT_PATH: build/export
      APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: List installed Xcodes
        run: |
          ls -la /Applications | grep Xcode
          xcodebuild -version

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app
          xcodebuild -version
          xcodebuild -showsdks
          ls -la /Applications/Xcode_26.0.1.app/Contents/Developer/Platforms || true
          ls -la /Applications/Xcode_26.0.1.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs || true


      - name: Install iOS 26 Platform
        run: |
          sudo xcodebuild -license accept || true
          sudo xcodebuild -runFirstLaunch || true
          xcodebuild -downloadPlatform iOS
          xcodebuild -showsdks
          
      - name: Install tools
        run: |
          sudo gem install cocoapods xcodeproj
          pod --version

      - name: Decode signing files
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/distribution.p12"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"

          mkdir -p ~/private_keys
          printf "%s" "$APP_STORE_CONNECT_API_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

      - name: Verify decoded signing files
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "=== P12 INFO ==="
          ls -lh "$RUNNER_TEMP/distribution.p12"
          openssl pkcs12 -info -in "$RUNNER_TEMP/distribution.p12" -passin pass:"$P12_PASSWORD" -noout

          echo "=== PROFILE INFO ==="
          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          /usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/profile.plist"
          /usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/profile.plist"
          /usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$RUNNER_TEMP/profile.plist"
          /usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$RUNNER_TEMP/profile.plist"
          /usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" "$RUNNER_TEMP/profile.plist" || true
          /usr/libexec/PlistBuddy -c "Print Entitlements:aps-environment" "$RUNNER_TEMP/profile.plist" || true

      - name: Convert p12 to macOS compatible format
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          openssl pkcs12 \
            -in "$RUNNER_TEMP/distribution.p12" \
            -passin pass:"$P12_PASSWORD" \
            -nodes \
            -out "$RUNNER_TEMP/cert_and_key.pem"

          openssl pkcs12 \
            -export \
            -in "$RUNNER_TEMP/cert_and_key.pem" \
            -out "$RUNNER_TEMP/distribution_legacy.p12" \
            -passout pass:"$P12_PASSWORD" \
            -keypbe PBE-SHA1-3DES \
            -certpbe PBE-SHA1-3DES \
            -macalg sha1

      - name: Install certificate
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/distribution_legacy.p12" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"

          echo "=== AVAILABLE IDENTITIES ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          CERT_SHA1=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/Apple Distribution/ {print $2; exit}')
          if [ -z "$CERT_SHA1" ]; then
            echo "Apple Distribution identity not found"
            exit 1
          fi
          echo "CERT_SHA1=$CERT_SHA1" >> "$GITHUB_ENV"
          echo "Signing cert SHA1: $CERT_SHA1"

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/profile.plist")
          cp "$RUNNER_TEMP/profile.mobileprovision" ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed profile UUID: $PROFILE_UUID"
          echo "Installed profile Name: $PROFILE_NAME"

      - name: Install Pods
        run: |
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Configure signing only for app target
        run: |
          ruby <<'RUBY'
          require 'xcodeproj'

          team = ENV['APPLE_TEAM_ID']
          bundle_id = ENV['APP_BUNDLE_ID']
          profile_name = ENV['PROFILE_NAME']

          project = Xcodeproj::Project.open('SirPhilipKorea.xcodeproj')
          app_target = project.targets.find { |t| t.name == 'SirPhilipKorea' }
          raise 'SirPhilipKorea target not found' unless app_target

          app_target.build_configurations.each do |config|
            s = config.build_settings
            s['DEVELOPMENT_TEAM'] = team
            s['PRODUCT_BUNDLE_IDENTIFIER'] = bundle_id
            s['CODE_SIGN_STYLE'] = 'Manual'
            s['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
            s['PROVISIONING_PROFILE_SPECIFIER'] = profile_name
            s['PROVISIONING_PROFILE'] = ''
            s['PRODUCT_NAME'] = 'SirPhilipKorea'
            s['EXECUTABLE_NAME'] = 'SirPhilipKorea'
            s['INFOPLIST_KEY_CFBundleName'] = 'SirPhilipKorea'
            s['INFOPLIST_KEY_CFBundleDisplayName'] = '써필립코리아'
          end
          project.save

          if File.exist?('Pods/Pods.xcodeproj')
            pods = Xcodeproj::Project.open('Pods/Pods.xcodeproj')
            pods.targets.each do |target|
              target.build_configurations.each do |config|
                s = config.build_settings
                s['CODE_SIGNING_ALLOWED'] = 'NO'
                s['CODE_SIGNING_REQUIRED'] = 'NO'
                s['CODE_SIGN_IDENTITY'] = ''
                s['DEVELOPMENT_TEAM'] = ''
                s['PROVISIONING_PROFILE_SPECIFIER'] = ''
                s['PROVISIONING_PROFILE'] = ''
              end
            end
            pods.save
          end
          RUBY

      - name: Confirm workspace and scheme
        run: |
          echo "=== Files ==="
          ls -la
          echo "=== Schemes ==="
          xcodebuild -list -workspace "$WORKSPACE"

      - name: Archive
        run: |
          rm -rf build ~/Library/Developer/Xcode/DerivedData
          xcodebuild clean archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Verify archive signature
        run: |
          APP_PATH=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" -type d | head -n 1)
          echo "=== ARCHIVE APP PATH ==="
          echo "$APP_PATH"
          echo "=== ARCHIVE CODESIGN INFO ==="
          codesign -dvvv "$APP_PATH" 2>&1
          echo "=== ARCHIVE ENTITLEMENTS ==="
          codesign -d --entitlements :- "$APP_PATH" 2>/dev/null || true
          echo "=== ARCHIVE STRICT VERIFY ==="
          codesign --verify --strict --verbose=6 "$APP_PATH"
          if ! codesign -dvvv "$APP_PATH" 2>&1 | grep -q "Authority=Apple Distribution"; then
            echo "Archive is not signed with Apple Distribution"
            exit 1
          fi

      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$APP_BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          EOF
          cat ExportOptions.plist

      - name: Export IPA
        run: |
          rm -rf "$EXPORT_PATH"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist

          IPA_PATH=$(find "$EXPORT_PATH" -name "*.ipa" -type f | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found"
            exit 1
          fi

          FINAL_IPA="$EXPORT_PATH/SirPhilipKorea.ipa"
          if [ "$IPA_PATH" != "$FINAL_IPA" ]; then
            mv "$IPA_PATH" "$FINAL_IPA"
          fi
          echo "IPA_PATH=$FINAL_IPA" >> "$GITHUB_ENV"
          echo "IPA path: $FINAL_IPA"

      - name: Verify IPA signature
        run: |
          rm -rf build/ipa_check
          mkdir -p build/ipa_check
          ditto -x -k "$IPA_PATH" build/ipa_check
          APP_PATH=$(find build/ipa_check/Payload -name "*.app" -type d | head -n 1)

          echo "=== IPA APP PATH ==="
          echo "$APP_PATH"
          if echo "$APP_PATH" | grep -q "써필립\|써"; then
            echo "ERROR: IPA app bundle path still contains Korean text"
            exit 1
          fi

          echo "=== IPA CODESIGN INFO ==="
          codesign -dvvv "$APP_PATH" 2>&1
          echo "=== IPA ENTITLEMENTS ==="
          codesign -d --entitlements :- "$APP_PATH" 2>/dev/null || true
          echo "=== IPA STRICT VERIFY ==="
          codesign --verify --strict --verbose=6 "$APP_PATH"
          echo "=== IPA DEEP STRICT VERIFY ==="
          codesign --verify --strict --deep --verbose=6 "$APP_PATH"

          echo "=== EMBEDDED PROFILE ==="
          security cms -D -i "$APP_PATH/embedded.mobileprovision" > build/embedded-profile.plist
          /usr/libexec/PlistBuddy -c "Print Name" build/embedded-profile.plist || true
          /usr/libexec/PlistBuddy -c "Print UUID" build/embedded-profile.plist || true
          /usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" build/embedded-profile.plist || true
          /usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" build/embedded-profile.plist || true
          /usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" build/embedded-profile.plist || true
          /usr/libexec/PlistBuddy -c "Print ProvisionedDevices" build/embedded-profile.plist || true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: IPA
          path: build/export/*.ipa

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v5.2.1
        with:
          app-path: build/export/SirPhilipKorea.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          uses-non-exempt-encryption: 'false'
          wait-for-processing: 'false'
          backend: AppStoreAPI
