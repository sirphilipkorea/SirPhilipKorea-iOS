name: Build iOS & Upload TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod --version

      - name: Install Apple Distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/apple_distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "=== Available code signing identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install App Store provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_PATH="$RUNNER_TEMP/SirPhilipKorea_AppStore_Profile.mobileprovision"

          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/profile.plist")

          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed profile: $PROFILE_NAME / $PROFILE_UUID"

      - name: Install Pods
        run: |
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Remove CocoaPods aggregate linker residue
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          files = list(Path('.').rglob('*.xcconfig')) + list(Path('.').rglob('project.pbxproj'))
          target_pattern = r'Pods_Sir_Philip_Korea_+'

          for path in files:
              text = path.read_text(errors='ignore')
              old = text

              # Remove array-style pairs in project.pbxproj: "-framework", "Pods_Sir..."
              text = re.sub(r'\s*"-framework",\s*\n\s*"' + target_pattern + r'",?\s*\n', '\n', text)

              # Remove inline linker flags in xcconfig/pbxproj: -framework "Pods_Sir..."
              text = re.sub(r'\s*-framework\s+"?' + target_pattern + r'"?', '', text)

              # Remove any leftover line that only points to the broken aggregate framework.
              kept = []
              for line in text.splitlines(True):
                  if re.search(target_pattern, line):
                      # If a mixed OTHER_LDFLAGS line survived, keep after cleanup; otherwise drop.
                      if 'OTHER_LDFLAGS' in line and not re.search(target_pattern, line):
                          kept.append(line)
                      # Drop stale framework-search or framework-reference lines.
                  else:
                      kept.append(line)
              text = ''.join(kept)

              if text != old:
                  path.write_text(text)
                  print(f'Cleaned {path}')

          print('=== Remaining Pods_Sir references ===')
          import os
          os.system('grep -R "Pods_Sir" . || true')
          PY

      - name: Build archive
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          xcodebuild clean archive \
            -workspace "Sir Philip Korea 써필립 코리아.xcworkspace" \
            -scheme "Sir Philip Korea 써필립 코리아" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/SirPhilipKorea.xcarchive \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ secrets.APP_BUNDLE_ID }}</key>
              <string>SirPhilipKorea_AppStore_Profile</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/SirPhilipKorea.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Find IPA
        run: |
          IPA_PATH=$(find build/export -name "*.ipa" -type f | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "IPA path: $IPA_PATH"

      - name: Verify IPA signature
        run: |
          rm -rf build/ipa_check
          unzip -q "$IPA_PATH" -d build/ipa_check
          APP_PATH=$(find build/ipa_check/Payload -name "*.app" -type d | head -n 1)

          echo "=== APP PATH ==="
          echo "$APP_PATH"

          echo "=== CODESIGN INFO ==="
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 || true

          echo "=== EMBEDDED PROFILE ==="
          security cms -D -i "$APP_PATH/embedded.mobileprovision" > build/profile.plist
          /usr/libexec/PlistBuddy -c "Print Name" build/profile.plist || true
          /usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" build/profile.plist || true

          echo "=== PROFILE DETAILS ==="
          /usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" build/profile.plist || true
          /usr/libexec/PlistBuddy -c "Print ProvisionedDevices" build/profile.plist || true
          /usr/libexec/PlistBuddy -c "Print ProvisionsAllDevices" build/profile.plist || true

          echo "=== APP ENTITLEMENTS ==="
          codesign -d --entitlements :- "$APP_PATH" 2>/dev/null || true

          echo "=== PROFILE DETAILS ==="
          /usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" build/profile.plist || true
          /usr/libexec/PlistBuddy -c "Print ProvisionedDevices" build/profile.plist || true
          /usr/libexec/PlistBuddy -c "Print ProvisionsAllDevices" build/profile.plist || true
          /usr/libexec/PlistBuddy -c "Print Platform" build/profile.plist || true          

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v5.2.1
        with:
          app-path: ${{ env.IPA_PATH }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          uses-non-exempt-encryption: 'false'
          wait-for-processing: 'true'
          backend: AppStoreAPI
