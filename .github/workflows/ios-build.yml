name: iOS TestFlight Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    env:
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
      WORKSPACE: "Sir Philip Korea 써필립 코리아.xcworkspace"
      SCHEME: "Sir Philip Korea 써필립 코리아"
      CONFIGURATION: Release
      ARCHIVE_PATH: build/SirPhilipKorea.xcarchive
      EXPORT_PATH: build/export

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod --version
          pod install --repo-update

      - name: Decode signing files
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/distribution.p12"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"

          mkdir -p ~/private_keys
          printf "%s" "$APP_STORE_CONNECT_API_KEY" > ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

      - name: Install certificate
        env:
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/distribution.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "" \
            "$KEYCHAIN_PATH"

          echo "=== Available code signing identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/profile.plist")
          PROFILE_TEAM=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$RUNNER_TEMP/profile.plist")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$RUNNER_TEMP/profile.plist")

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

          echo "=== Installed provisioning profile ==="
          echo "Name: $PROFILE_NAME"
          echo "UUID: $PROFILE_UUID"
          echo "Team: $PROFILE_TEAM"
          echo "App ID: $PROFILE_APP_ID"
          /usr/libexec/PlistBuddy -c "Print Entitlements:aps-environment" "$RUNNER_TEMP/profile.plist" || true
          /usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" "$RUNNER_TEMP/profile.plist" || true
          /usr/libexec/PlistBuddy -c "Print ProvisionedDevices" "$RUNNER_TEMP/profile.plist" && exit 1 || true

      - name: Clean CocoaPods stale linker references
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          pattern = r'Pods_Sir_Philip_Korea_+'
          paths = list(Path('.').rglob('*.xcconfig')) + list(Path('.').rglob('project.pbxproj'))

          for path in paths:
              text = path.read_text(errors='ignore')
              old = text
              text = re.sub(r'\s*"-framework",\s*\n\s*"' + pattern + r'",?\s*\n', '\n', text)
              text = re.sub(r'\s*-framework\s+"?' + pattern + r'"?', '', text)
              lines = []
              for line in text.splitlines(True):
                  if re.search(pattern, line):
                      continue
                  lines.append(line)
              text = ''.join(lines)
              if text != old:
                  path.write_text(text)
                  print(f'Cleaned {path}')
          PY

      - name: Archive with explicit App Store signing
        run: |
          rm -rf build "$HOME/Library/Developer/Xcode/DerivedData"

          xcodebuild clean archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Verify archive signature before export
        run: |
          APP_PATH=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" -type d | head -n 1)
          echo "=== ARCHIVE APP PATH ==="
          echo "$APP_PATH"
          echo "=== ARCHIVE CODESIGN INFO ==="
          codesign -dvvv "$APP_PATH" 2>&1
          echo "=== ARCHIVE ENTITLEMENTS ==="
          codesign -d --entitlements :- "$APP_PATH" 2>/dev/null
          echo "=== ARCHIVE EMBEDDED PROFILE ==="
          security cms -D -i "$APP_PATH/embedded.mobileprovision" > "$RUNNER_TEMP/archive-embedded.plist"
          /usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/archive-embedded.plist"
          /usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$RUNNER_TEMP/archive-embedded.plist"
          /usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" "$RUNNER_TEMP/archive-embedded.plist" || true

      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          EOF
          cat ExportOptions.plist

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions.plist

          IPA_PATH=$(find "$EXPORT_PATH" -name "*.ipa" -type f | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found"
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "IPA path: $IPA_PATH"

      - name: Verify IPA signature after export
        run: |
          rm -rf build/ipa_check
          mkdir -p build/ipa_check
          unzip -q "$IPA_PATH" -d build/ipa_check
          APP_PATH=$(find build/ipa_check/Payload -name "*.app" -type d | head -n 1)

          echo "=== IPA APP PATH ==="
          echo "$APP_PATH"
          echo "=== IPA CODESIGN INFO ==="
          codesign -dvvv "$APP_PATH" 2>&1
          echo "=== IPA ENTITLEMENTS ==="
          codesign -d --entitlements :- "$APP_PATH" 2>/dev/null
          echo "=== IPA EMBEDDED PROFILE ==="
          security cms -D -i "$APP_PATH/embedded.mobileprovision" > "$RUNNER_TEMP/ipa-embedded.plist"
          /usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/ipa-embedded.plist"
          /usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$RUNNER_TEMP/ipa-embedded.plist"
          /usr/libexec/PlistBuddy -c "Print Entitlements:aps-environment" "$RUNNER_TEMP/ipa-embedded.plist" || true
          /usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" "$RUNNER_TEMP/ipa-embedded.plist" || true

      - name: Validate IPA with Apple
        run: |
          xcrun altool --validate-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SirPhilipKorea-IPA
          path: build/export/*.ipa
