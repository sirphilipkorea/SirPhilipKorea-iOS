name: Build iOS & Upload TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install tools
        run: |
          sudo gem install cocoapods xcodeproj
          pod repo update

      - name: Install certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision"))
          cp "$RUNNER_TEMP/profile.mobileprovision" ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "Installed profile UUID: $PROFILE_UUID"

      - name: Clean and install pods
        run: |
          pod deintegrate || true
          rm -rf Pods
          pod install --repo-update

      - name: Configure signing only for app target
        run: |
          ruby <<'RUBY'
          require 'xcodeproj'

          project_path = 'Sir Philip Korea 써필립 코리아.xcodeproj'
          app_target_name = 'Sir Philip Korea 써필립 코리아'
          team_id = ENV['APPLE_TEAM_ID']
          bundle_id = ENV['APP_BUNDLE_ID']
          profile_name = 'SirPhilipKorea_AppStore_Profile'

          project = Xcodeproj::Project.open(project_path)

          project.targets.each do |target|
            target.build_configurations.each do |config|
              s = config.build_settings

              if target.name == app_target_name
                s['PRODUCT_BUNDLE_IDENTIFIER'] = bundle_id
                s['DEVELOPMENT_TEAM'] = team_id
                s['CODE_SIGN_STYLE'] = 'Manual'
                s['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
                s['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
                s['PROVISIONING_PROFILE_SPECIFIER'] = profile_name
              else
                s['CODE_SIGNING_ALLOWED'] = 'NO'
                s['CODE_SIGNING_REQUIRED'] = 'NO'
                s.delete('CODE_SIGN_IDENTITY')
                s.delete('CODE_SIGN_IDENTITY[sdk=iphoneos*]')
                s.delete('PROVISIONING_PROFILE_SPECIFIER')
                s.delete('PROVISIONING_PROFILE')
              end
            end
          end

          project.save

          pods_path = 'Pods/Pods.xcodeproj'
          if File.exist?(pods_path)
            pods = Xcodeproj::Project.open(pods_path)
            pods.targets.each do |target|
              target.build_configurations.each do |config|
                s = config.build_settings
                s['CODE_SIGNING_ALLOWED'] = 'NO'
                s['CODE_SIGNING_REQUIRED'] = 'NO'
                s.delete('CODE_SIGN_IDENTITY')
                s.delete('CODE_SIGN_IDENTITY[sdk=iphoneos*]')
                s.delete('PROVISIONING_PROFILE_SPECIFIER')
                s.delete('PROVISIONING_PROFILE')
              end
            end
            pods.save
          end
          RUBY
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}

      - name: Build archive
        run: |
          xcodebuild archive \
            -workspace "Sir Philip Korea 써필립 코리아.xcworkspace" \
            -scheme "Sir Philip Korea 써필립 코리아" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/SirPhilipKorea.xcarchive

      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ secrets.APP_BUNDLE_ID }}</key>
              <string>SirPhilipKorea_AppStore_Profile</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/SirPhilipKorea.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

          xcrun altool \
            --upload-app \
            --type ios \
            --file build/export/*.ipa \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
