name: Build iOS & Upload TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install tools
        run: |
          sudo gem install cocoapods xcodeproj
          pod repo update

      - name: Install certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          
          CERT_SHA1=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/Apple Distribution/ {print $2; exit}')
          echo "CERT_SHA1=$CERT_SHA1" >> $GITHUB_ENV
          echo "Signing cert SHA1: $CERT_SHA1"
          

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision"))
          cp "$RUNNER_TEMP/profile.mobileprovision" ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "Installed profile UUID: $PROFILE_UUID"

      - name: Clean and install pods
        run: |
          pod deintegrate || true
          rm -rf Pods
          pod install --repo-update
      
      - name: Remove invalid Pods framework references
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
      
          pbx = next(Path(".").rglob("project.pbxproj"))
      
          txt = pbx.read_text(errors="ignore")
          old = txt
      
          # Framework Search Paths
          txt = re.sub(r'.*Pods_Sir_Philip_Korea.*\n', '', txt)
      
          # Framework references
          txt = re.sub(r'.*Pods_Sir_Philip_Korea________\.framework.*\n', '', txt)
      
          # Linker flags
          txt = re.sub(r'-framework "?Pods_Sir_Philip_Korea[^"]*"?', '', txt)
      
          pbx.write_text(txt)
      
          print("project.pbxproj cleaned")
          PY


      - name: Remove broken Pods aggregate framework from xcconfig
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          for path in Path(".").rglob("*.xcconfig"):
              text = path.read_text(errors="ignore")
              old = text

              text = re.sub(r'\s-framework\s+"?Pods_Sir[^"\s]*"?', '', text)
              text = text.replace('Pods_Sir_Philip_Korea________', '')

              if text != old:
                  path.write_text(text)
                  print(f"Fixed {path}")

          print("Remaining Pods_Sir references:")
          import os
          os.system('grep -R "Pods_Sir" . || true')
          PY

      - name: Configure signing only for app target
        run: |
          ruby <<'RUBY'
          require 'xcodeproj'

          project_path = 'Sir Philip Korea 써필립 코리아.xcodeproj'
          app_target_name = 'Sir Philip Korea 써필립 코리아'
          team_id = ENV['APPLE_TEAM_ID']
          bundle_id = ENV['APP_BUNDLE_ID']
          profile_name = 'SirPhilipKorea_AppStore_Profile'

          project = Xcodeproj::Project.open(project_path)

          project.targets.each do |target|
            target.build_configurations.each do |config|
              s = config.build_settings

              if target.name == app_target_name
                s['PRODUCT_BUNDLE_IDENTIFIER'] = bundle_id
                s['DEVELOPMENT_TEAM'] = team_id
                s['CODE_SIGN_STYLE'] = 'Manual'
                s['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
                s['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
                s['PROVISIONING_PROFILE_SPECIFIER'] = profile_name
              else
                s['CODE_SIGNING_ALLOWED'] = 'NO'
                s['CODE_SIGNING_REQUIRED'] = 'NO'
                s.delete('CODE_SIGN_IDENTITY')
                s.delete('CODE_SIGN_IDENTITY[sdk=iphoneos*]')
                s.delete('PROVISIONING_PROFILE_SPECIFIER')
                s.delete('PROVISIONING_PROFILE')
              end
            end
          end

          project.save

          pods_path = 'Pods/Pods.xcodeproj'
          if File.exist?(pods_path)
            pods = Xcodeproj::Project.open(pods_path)
            pods.targets.each do |target|
              target.build_configurations.each do |config|
                s = config.build_settings
                s['CODE_SIGNING_ALLOWED'] = 'NO'
                s['CODE_SIGNING_REQUIRED'] = 'NO'
                s.delete('CODE_SIGN_IDENTITY')
                s.delete('CODE_SIGN_IDENTITY[sdk=iphoneos*]')
                s.delete('PROVISIONING_PROFILE_SPECIFIER')
                s.delete('PROVISIONING_PROFILE')
              end
            end
            pods.save
          end
          RUBY
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}

      - name: Remove broken Pods wrapper framework from app target
        run: |
          ruby <<'RUBY'
          require 'xcodeproj'

          project_path = 'Sir Philip Korea 써필립 코리아.xcodeproj'
          app_target_name = 'Sir Philip Korea 써필립 코리아'

          project = Xcodeproj::Project.open(project_path)

          project.targets.each do |target|
            next unless target.name == app_target_name

            target.build_configurations.each do |config|
              flags = config.build_settings['OTHER_LDFLAGS']
              next unless flags

              flags = flags.map(&:to_s)

              cleaned = []
              skip_next = false

              flags.each_with_index do |flag, i|
                if skip_next
                  skip_next = false
                  next
                end

                if flag == '-framework' && flags[i + 1].to_s.start_with?('Pods_')
                  skip_next = true
                  next
                end

                next if flag.start_with?('Pods_')

                cleaned << flag
              end

              config.build_settings['OTHER_LDFLAGS'] = cleaned
            end
          end

          project.save
          RUBY

      - name: Build archive
        run: |
          xcodebuild archive \
            -workspace "Sir Philip Korea 써필립 코리아.xcworkspace" \
            -scheme "Sir Philip Korea 써필립 코리아" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/SirPhilipKorea.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ secrets.APP_BUNDLE_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID"
            
      - name: Create ExportOptions.plist
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>$CERT_SHA1</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ secrets.APP_BUNDLE_ID }}</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF
          
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/SirPhilipKorea.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Verify IPA signature
        run: |
          unzip -q build/export/*.ipa -d build/ipa_check
          APP_PATH=$(find build/ipa_check/Payload -name "*.app" -type d | head -n 1)

          echo "=== APP PATH ==="
          echo "$APP_PATH"

          echo "=== CODESIGN INFO ==="
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 || true

          echo "=== EMBEDDED PROFILE ==="
          security cms -D -i "$APP_PATH/embedded.mobileprovision" > build/profile.plist
          /usr/libexec/PlistBuddy -c "Print Name" build/profile.plist || true
          /usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" build/profile.plist || true

          echo "=== AVAILABLE IDENTITIES ==="
          security find-identity -v -p codesigning


      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v5.2.1
        with:
          app-path: build/export/SirPhilipKorea써필립코리아.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          uses-non-exempt-encryption: 'false'
          wait-for-processing: 'false'
          backend: AppStoreAPI
