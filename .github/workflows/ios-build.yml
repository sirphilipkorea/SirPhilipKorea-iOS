name: iOS Build and Upload

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix bundle id and signing
        run: |
          /usr/bin/perl -pi -e 's/PRODUCT_BUNDLE_IDENTIFIER = \*\*\*\*;/PRODUCT_BUNDLE_IDENTIFIER = com.sirphilipkorea.app;/g' "Sir Philip Korea 써필립 코리아.xcodeproj/project.pbxproj"
          /usr/bin/perl -pi -e 's/DEVELOPMENT_TEAM = .*?;/DEVELOPMENT_TEAM = BA9RRCP43W;/g' "Sir Philip Korea 써필립 코리아.xcodeproj/project.pbxproj"

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod install

      - name: Disable code signing for Pods
        run: |
          find Pods -name "project.pbxproj" -print0 | xargs -0 perl -pi -e 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g'
          find Pods -name "project.pbxproj" -print0 | xargs -0 perl -pi -e 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g'

      - name: Create API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          chmod 600 ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Build archive
        run: |
          xcodebuild archive \
            -workspace "Sir Philip Korea 써필립 코리아.xcworkspace" \
            -scheme "Sir Philip Korea 써필립 코리아" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "build/SirPhilipKorea.xcarchive" \
            DEVELOPMENT_TEAM="BA9RRCP43W" \
            PRODUCT_BUNDLE_IDENTIFIER="com.sirphilipkorea.app" \
            CODE_SIGN_STYLE="Automatic" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Create export options
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>BA9RRCP43W</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "build/SirPhilipKorea.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SirPhilipKorea-IPA
          path: build/export/*.ipa

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/export/*.ipa \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
