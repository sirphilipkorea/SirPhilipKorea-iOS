name: iOS Build and Upload

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo gem install cocoapods
          sudo gem install xcodeproj

      - name: Install certificate and profile
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" | base64 --decode > $CERT_PATH
          echo "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}" | base64 --decode > $PROFILE_PATH

          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERT_PATH -P "${{ secrets.P12_PASSWORD }}" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/SirPhilipKorea.mobileprovision

      - name: Install pods
        run: |
          pod deintegrate || true
          pod install

      - name: Fix project signing and Pods link issue
        run: |
          ruby <<'RUBY'
          require 'xcodeproj'

          project_path = 'Sir Philip Korea 써필립 코리아.xcodeproj'
          app_target_name = 'Sir Philip Korea 써필립 코리아'
          team_id = 'BA9RRCP43W'
          bundle_id = 'com.sirphilipkorea.app'
          profile_name = 'SirPhilipKorea_AppStore_Profile'

          project = Xcodeproj::Project.open(project_path)

          project.targets.each do |target|
            target.build_configurations.each do |config|
              s = config.build_settings

              if target.name == app_target_name
                s['PRODUCT_BUNDLE_IDENTIFIER'] = bundle_id
                s['DEVELOPMENT_TEAM'] = team_id
                s['CODE_SIGN_STYLE'] = 'Manual'
                s['CODE_SIGNING_ALLOWED'] = 'YES'
                s['CODE_SIGNING_REQUIRED'] = 'YES'
                s['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
                s['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
                s['PROVISIONING_PROFILE_SPECIFIER'] = profile_name

              if s['OTHER_LDFLAGS']
                flags = s['OTHER_LDFLAGS']
                flags = flags.map { |x| x.to_s }
              
                cleaned = []
                skip_next = false
              
                flags.each_with_index do |flag, i|
                  if skip_next
                    skip_next = false
                    next
                  end
              
                  if flag == '-framework' && flags[i + 1].to_s.include?('Pods_Sir')
                    skip_next = true
                    next
                  end
              
                  next if flag.include?('Pods_Sir')
              
                  cleaned << flag
                end
              
                s['OTHER_LDFLAGS'] = cleaned
              end
              else
                s['CODE_SIGNING_ALLOWED'] = 'NO'
                s['CODE_SIGNING_REQUIRED'] = 'NO'
                s.delete('CODE_SIGN_IDENTITY')
                s.delete('CODE_SIGN_IDENTITY[sdk=iphoneos*]')
                s.delete('DEVELOPMENT_TEAM')
                s.delete('PROVISIONING_PROFILE_SPECIFIER')
                s.delete('PROVISIONING_PROFILE')
              end
            end
          end

          project.save

          pods_path = 'Pods/Pods.xcodeproj'
          if File.exist?(pods_path)
            pods = Xcodeproj::Project.open(pods_path)
            pods.targets.each do |target|
              target.build_configurations.each do |config|
                s = config.build_settings
                s['CODE_SIGNING_ALLOWED'] = 'NO'
                s['CODE_SIGNING_REQUIRED'] = 'NO'
                s.delete('CODE_SIGN_IDENTITY')
                s.delete('CODE_SIGN_IDENTITY[sdk=iphoneos*]')
                s.delete('DEVELOPMENT_TEAM')
                s.delete('PROVISIONING_PROFILE_SPECIFIER')
                s.delete('PROVISIONING_PROFILE')
              end
            end
            pods.save
          end
          RUBY

      - name: Build archive
        run: |
          xcodebuild archive \
            -workspace "Sir Philip Korea 써필립 코리아.xcworkspace" \
            -scheme "Sir Philip Korea 써필립 코리아" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "build/SirPhilipKorea.xcarchive"

      - name: Create export options
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>BA9RRCP43W</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.sirphilipkorea.app</key>
              <string>SirPhilipKorea_AppStore_Profile</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "build/SirPhilipKorea.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/export/*.ipa \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
