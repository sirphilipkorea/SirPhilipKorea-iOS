name: Build iOS & Upload TestFlight

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: macos-15

    env:
      CERTIFICATE_PATH: ${{ runner.temp }}/certificate.p12
      PROFILE_PATH: ${{ runner.temp }}/profile.mobileprovision
      KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.4.app

    - name: Install CocoaPods
      run: |
        sudo gem install cocoapods
        pod repo update

    ###########################################################
    ## Install Signing Certificate
    ###########################################################

    - name: Install Certificate
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      run: |

        echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH

        security create-keychain -p "" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "" $KEYCHAIN_PATH

        security import $CERTIFICATE_PATH \
          -P "$P12_PASSWORD" \
          -A \
          -t cert \
          -f pkcs12 \
          -k $KEYCHAIN_PATH

        security list-keychains -d user -s $KEYCHAIN_PATH

    ###########################################################
    ## Install Provisioning Profile
    ###########################################################

    - name: Install Provisioning Profile
      env:
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      run: |

        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

        echo "$BUILD_PROVISION_PROFILE_BASE64" \
        | base64 --decode \
        > ~/Library/MobileDevice/Provisioning\ Profiles/SirPhilipKorea.mobileprovision

    ###########################################################
    ## Pods
    ###########################################################

    - name: Install Pods
      run: |

        pod deintegrate || true
        rm -rf Pods
        rm -rf Podfile.lock

        pod install --repo-update

    ###########################################################
    ## Archive
    ###########################################################

    - name: Build Archive

      run: |

        xcodebuild archive \
        -workspace "Sir Philip Korea 써필립 코리아.xcworkspace" \
        -scheme "Sir Philip Korea 써필립 코리아" \
        -configuration Release \
        -destination "generic/platform=iOS" \
        -archivePath build/SirPhilipKorea.xcarchive \
        DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
        PRODUCT_BUNDLE_IDENTIFIER="${{ secrets.APP_BUNDLE_ID }}" \
        CODE_SIGN_STYLE=Manual \
        PROVISIONING_PROFILE_SPECIFIER="SirPhilipKorea_AppStore_Profile"

    ###########################################################
    ## ExportOptions
    ###########################################################

    - name: Export Options

      run: |

        cat > ExportOptions.plist <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
        "http://www.apple.com/DTDs/PropertyList-1.0.dtd">

        <plist version="1.0">

        <dict>

            <key>method</key>
            <string>app-store-connect</string>

            <key>signingStyle</key>
            <string>manual</string>

            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>

            <key>provisioningProfiles</key>

            <dict>

                <key>${{ secrets.APP_BUNDLE_ID }}</key>

                <string>SirPhilipKorea_AppStore_Profile</string>

            </dict>

        </dict>

        </plist>

        EOF

    ###########################################################
    ## Export IPA
    ###########################################################

    - name: Export IPA

      run: |

        xcodebuild -exportArchive \
        -archivePath build/SirPhilipKorea.xcarchive \
        -exportPath build/export \
        -exportOptionsPlist ExportOptions.plist

    ###########################################################
    ## Upload TestFlight
    ###########################################################

    - name: Upload TestFlight

      env:
        APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      run: |

        mkdir private_keys

        echo "$APP_STORE_CONNECT_API_KEY" > private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

        xcrun altool \
        --upload-app \
        --type ios \
        --file build/export/*.ipa \
        --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
        --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
